name: Laravel Deploy (Shared Hosting)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Set up PHP 8.2 locally for Composer
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, pdo, mysql
          ini-values: post_max_size=256M, upload_max_filesize=256M

      # 3. Composer install локально (создаём vendor)
      - name: Install Composer dependencies locally
        working-directory: ./ea-test-assignment/ea-test
        run: composer install --no-dev --prefer-dist --ignore-platform-req=ext-http

      # 4. Rsync deploy на сервер
      - name: Deploy project to server
        env:
          RSYNC_RSH: "ssh -i ${{ secrets.SERVER_SSH_KEY }} -p ${{ secrets.SERVER_SSH_PORT }}"
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='storage' \
            ./ea-test-assignment/ea-test/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/u3412095/data/www/test.ukidoshi.store/ea-test-assignment/ea-test/

      # 5. SSH для миграций и кэширования
      - name: Run Laravel commands on server
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            cd /var/www/u3412095/data/www/test.ukidoshi.store/ea-test-assignment/ea-test
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache